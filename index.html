
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#F7F4EF;--bg2:#EDE9E2;--surface:#FFFFFF;--surface2:#F2EFE9;
  --border:rgba(0,0,0,0.08);--text:#1C1916;--text2:#7A7470;--text3:#A89E98;
  --accent:#C8865A;--accent2:#B56F43;--btn-fg:#FFFFFF;
  --glass:rgba(255,255,255,0.65);--glass-border:rgba(255,255,255,0.5);
  --glass-blur:16px;--del:#D4685C;--done:#C8865A;
  --T:0.3s ease;
  --font:'Inter',sans-serif;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#141414;--bg2:#1E1E1E;--surface:#242424;--surface2:#1A1A1A;
    --border:rgba(255,255,255,0.07);--text:#F0EDEA;--text2:#7A7875;--text3:#5A5855;
    --accent:#E8D5B0;--accent2:#D4BC90;--btn-fg:#1C1916;
    --glass:rgba(30,30,30,0.6);--glass-border:rgba(255,255,255,0.08);--del:#C06060;
  }
}
body{font-family:var(--font);background:var(--bg);color:var(--text);min-height:100vh;-webkit-user-select:none;user-select:none;}
input,textarea{-webkit-user-select:text;user-select:text;}
.wrap{max-width:560px;margin:0 auto;padding:20px 16px 60px;}
.page-title{font-size:22px;font-weight:500;color:var(--text);margin-bottom:4px;}
.page-sub{font-size:12px;color:var(--text3);margin-bottom:24px;letter-spacing:0.06em;}

.metrics-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:24px;}
.metric-card{background:var(--surface2);border-radius:12px;padding:12px;text-align:center;}
.metric-val{font-size:22px;font-weight:500;color:var(--accent);line-height:1.1;}
.metric-lbl{font-size:10px;color:var(--text3);margin-top:3px;letter-spacing:0.08em;}
.metric-diff{font-size:10px;margin-top:2px;font-weight:500;}
.diff-pos{color:#5C8B52;}.diff-neg{color:var(--del);}

.trackers-list{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}

.tracker-card{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;overflow:hidden;transition:box-shadow var(--T);}
.tracker-head{display:flex;align-items:center;gap:10px;padding:14px 16px 12px;cursor:pointer;}
.tracker-color-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.tracker-name{flex:1;font-size:14px;font-weight:500;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tracker-latest{font-size:13px;font-weight:500;color:var(--accent);flex-shrink:0;}
.tracker-unit{font-size:10px;color:var(--text3);margin-left:2px;}
.caret{font-size:12px;color:var(--text3);transition:transform 0.3s;flex-shrink:0;}
.tracker-card.collapsed .caret{transform:rotate(-90deg);}

.tracker-body{overflow:hidden;max-height:9999px;transition:max-height 0.35s ease;}
.tracker-card.collapsed .tracker-body{max-height:0;}
.tracker-inner{padding:0 16px 16px;}

.chart-wrap{position:relative;width:100%;height:160px;margin-bottom:14px;}

.add-entry-row{display:flex;gap:8px;margin-bottom:12px;}
.entry-input{flex:1;padding:9px 13px;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.2s;}
.entry-input:focus{border-color:var(--accent);}
.entry-input::placeholder{color:var(--text3);}
.add-entry-btn{padding:9px 16px;border:none;border-radius:12px;background:var(--accent);color:var(--btn-fg);font-family:var(--font);font-size:10px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;white-space:nowrap;transition:opacity 0.2s;}
.add-entry-btn:hover{opacity:0.85;}

.entries-mini{display:flex;flex-direction:column;gap:4px;max-height:160px;overflow-y:auto;}
.entry-row{display:flex;align-items:center;gap:8px;padding:6px 10px;border-radius:10px;background:var(--surface2);font-size:12px;}
.entry-date{color:var(--text3);flex-shrink:0;min-width:70px;}
.entry-val{font-weight:500;color:var(--text);margin-left:auto;}
.entry-del{background:none;border:none;color:var(--text3);cursor:pointer;font-size:14px;padding:0 2px;transition:color 0.15s;}
.entry-del:hover{color:var(--del);}

.tracker-actions{display:flex;gap:6px;margin-top:10px;}
.del-tracker-btn{flex:1;padding:8px;border:1px solid var(--border);border-radius:10px;background:none;color:var(--del);font-family:var(--font);font-size:9px;letter-spacing:0.12em;text-transform:uppercase;cursor:pointer;transition:background 0.15s;}
.del-tracker-btn:hover{background:var(--surface2);}
.goal-display{font-family:var(--font);font-size:10px;color:var(--text3);padding:4px 0 8px;display:flex;align-items:center;gap:6px;}
.goal-bar-wrap{flex:1;height:4px;background:var(--border);border-radius:2px;overflow:hidden;}
.goal-bar-fill{height:100%;border-radius:2px;background:var(--accent);transition:width 0.4s ease;}

.add-tracker-section{background:var(--glass);border:1px solid var(--glass-border);border-radius:18px;padding:16px;}
.add-section-lbl{font-size:9px;letter-spacing:0.2em;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.add-fields{display:flex;flex-direction:column;gap:8px;margin-bottom:12px;}
.add-fields-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.field-input{padding:9px 13px;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none;transition:border-color 0.2s;width:100%;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--text3);}
.field-select{padding:9px 13px;border:1px solid var(--glass-border);border-radius:12px;background:var(--surface2);color:var(--text);font-family:var(--font);font-size:13px;outline:none;width:100%;cursor:pointer;}
.create-btn{width:100%;padding:11px;border:none;border-radius:12px;background:var(--accent);color:var(--btn-fg);font-family:var(--font);font-size:10px;letter-spacing:0.14em;text-transform:uppercase;cursor:pointer;transition:opacity 0.2s;}
.create-btn:hover{opacity:0.88;}

.color-dots{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:4px;}
.color-dot-pick{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:border-color 0.15s,transform 0.15s;}
.color-dot-pick.selected{border-color:var(--text);transform:scale(1.15);}

.empty-state{text-align:center;padding:40px 20px;}
.empty-state h3{font-size:15px;color:var(--text2);font-weight:400;margin-bottom:5px;}
.empty-state p{font-size:11px;color:var(--text3);}
</style>

<div class="wrap">
  <h2 class="sr-only" style="position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0);">Tracker прогресса — числовые показатели с графиком</h2>
  <div class="page-title">progress</div>
  <div class="page-sub" id="overallSub">отслеживание числовых показателей</div>

  <div class="metrics-grid" id="overallMetrics"></div>
  <div class="trackers-list" id="trackersList"></div>

  <div class="add-tracker-section">
    <div class="add-section-lbl">новый показатель</div>
    <div class="add-fields">
      <input class="field-input" id="newName" placeholder="Название (вес, жим лёжа, бег…)" maxlength="40">
      <div class="add-fields-row">
        <input class="field-input" id="newUnit" placeholder="Единица (кг, км, мин)" maxlength="10">
        <input class="field-input" id="newGoal" placeholder="Цель (необязательно)" type="number">
      </div>
      <div class="add-fields-row">
        <select class="field-select" id="newDir">
          <option value="lower">Цель — меньше</option>
          <option value="higher">Цель — больше</option>
        </select>
        <select class="field-select" id="newChart">
          <option value="line">График линия</option>
          <option value="bar">График столбцы</option>
        </select>
      </div>
      <div class="color-dots" id="colorPicker"></div>
    </div>
    <button class="create-btn" onclick="createTracker()">+ создать</button>
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const COLORS=['#C8865A','#5B7CE6','#5C8B52','#E8A060','#E05C6A','#a09ad0','#00cc55','#F5A623','#7AB8D0','#D4685C'];
const MONTHS=['янв','фев','мар','апр','май','июн','июл','авг','сен','окт','ноя','дек'];
let selectedColor=COLORS[0];
let trackers=[];
let charts={};

function pad(n){return String(n).padStart(2,'0');}
function dateKey(d=new Date()){return`${pad(d.getDate())}.${pad(d.getMonth()+1)}.${d.getFullYear()}`;}
function fmtDate(str){const[d,m]=str.split('.');return`${d} ${MONTHS[parseInt(m)-1]}`;}

function save(){try{localStorage.setItem('progress_v1',JSON.stringify(trackers));}catch{}}
function load(){try{const r=localStorage.getItem('progress_v1');if(r)trackers=JSON.parse(r);}catch{}}

function renderColorPicker(){
  const el=document.getElementById('colorPicker');
  el.innerHTML=COLORS.map(c=>`<div class="color-dot-pick${c===selectedColor?' selected':''}" style="background:${c}" onclick="selectColor('${c}')"></div>`).join('');
}

function selectColor(c){selectedColor=c;renderColorPicker();}

function createTracker(){
  const name=document.getElementById('newName').value.trim();
  const unit=document.getElementById('newUnit').value.trim()||'';
  const goalRaw=document.getElementById('newGoal').value.trim();
  const goal=goalRaw?parseFloat(goalRaw):null;
  const dir=document.getElementById('newDir').value;
  const chartType=document.getElementById('newChart').value;
  if(!name)return;
  trackers.push({id:String(Date.now()),name,unit,goal,dir,chartType,color:selectedColor,entries:[],collapsed:false});
  document.getElementById('newName').value='';
  document.getElementById('newUnit').value='';
  document.getElementById('newGoal').value='';
  save();render();
}

function toggleTracker(id){
  const t=trackers.find(t=>t.id===id);if(!t)return;
  t.collapsed=!t.collapsed;save();render();
}

function addEntry(id){
  const inp=document.getElementById('ei_'+id);
  if(!inp)return;
  const val=parseFloat(inp.value);
  if(isNaN(val))return;
  const t=trackers.find(t=>t.id===id);if(!t)return;
  const today=dateKey();
  const existing=t.entries.findIndex(e=>e.date===today);
  if(existing>=0)t.entries[existing].val=val;
  else t.entries.push({date:today,val,ts:Date.now()});
  t.entries.sort((a,b)=>a.ts-b.ts);
  inp.value='';
  save();render();
}

function deleteEntry(tid,ts){
  const t=trackers.find(t=>t.id===tid);if(!t)return;
  t.entries=t.entries.filter(e=>e.ts!==ts);
  save();render();
}

function deleteTracker(id){
  trackers=trackers.filter(t=>t.id!==id);
  save();render();
}

function getStats(t){
  if(!t.entries.length)return null;
  const vals=t.entries.map(e=>e.val);
  const last=vals[vals.length-1];
  const first=vals[0];
  const prev=vals.length>1?vals[vals.length-2]:null;
  const diff=prev!==null?+(last-prev).toFixed(2):null;
  const best=t.dir==='lower'?Math.min(...vals):Math.max(...vals);
  return{last,first,diff,best};
}

function goalPct(t){
  if(!t.goal||!t.entries.length)return null;
  const last=t.entries[t.entries.length-1].val;
  if(t.dir==='lower'){
    const start=t.entries[0].val;
    if(start===t.goal)return 100;
    const pct=((start-last)/(start-t.goal)*100);
    return Math.min(100,Math.max(0,Math.round(pct)));
  } else {
    const pct=(last/t.goal*100);
    return Math.min(100,Math.round(pct));
  }
}

function renderOverallMetrics(){
  const el=document.getElementById('overallMetrics');
  const sub=document.getElementById('overallSub');
  if(!trackers.length){el.innerHTML='';sub.textContent='отслеживание числовых показателей';return;}
  const active=trackers.filter(t=>t.entries.length>0);
  const withGoal=trackers.filter(t=>t.goal&&t.entries.length);
  const achieved=withGoal.filter(t=>{
    const s=getStats(t);if(!s)return false;
    return t.dir==='lower'?s.last<=t.goal:s.last>=t.goal;
  });
  const totalEntries=trackers.reduce((s,t)=>s+t.entries.length,0);
  el.innerHTML=`
    <div class="metric-card"><div class="metric-val">${trackers.length}</div><div class="metric-lbl">показателей</div></div>
    <div class="metric-card"><div class="metric-val">${totalEntries}</div><div class="metric-lbl">записей</div></div>
    <div class="metric-card"><div class="metric-val">${achieved.length}/${withGoal.length||'—'}</div><div class="metric-lbl">целей достигнуто</div></div>
  `;
  sub.textContent=`${active.length} активных · ${totalEntries} записей`;
}

function renderChart(t, canvasId){
  if(charts[canvasId]){try{charts[canvasId].destroy();}catch{}}
  const canvas=document.getElementById(canvasId);
  if(!canvas||!t.entries.length)return;
  const isDark=matchMedia('(prefers-color-scheme:dark)').matches;
  const labels=t.entries.map(e=>fmtDate(e.date));
  const data=t.entries.map(e=>e.val);
  const gridColor=isDark?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.06)';
  const textColor=isDark?'#7A7875':'#A89E98';
  const goalLine=t.goal?{type:'line',scaleID:'y',value:t.goal,borderColor:isDark?'rgba(255,255,255,0.25)':'rgba(0,0,0,0.2)',borderDash:[4,4],borderWidth:1,label:{display:true,content:'цель',position:'start',font:{size:10},color:textColor,backgroundColor:'transparent',padding:0}}:null;

  const cfg={
    type:t.chartType||'line',
    data:{labels,datasets:[{
      label:t.name,
      data,
      borderColor:t.color,
      backgroundColor:t.chartType==='bar'?t.color+'cc':t.color+'22',
      fill:t.chartType!=='bar',
      tension:0.35,
      pointBackgroundColor:t.color,
      pointRadius:data.length>20?0:4,
      pointHoverRadius:5,
      borderWidth:2,
    }]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{callbacks:{label:ctx=>`${ctx.parsed.y} ${t.unit}`}},
        annotation:goalLine?{annotations:{goal:goalLine}}:{}
      },
      scales:{
        x:{ticks:{color:textColor,font:{size:10},maxTicksLimit:6},grid:{display:false}},
        y:{ticks:{color:textColor,font:{size:10}},grid:{color:gridColor}}
      }
    }
  };
  charts[canvasId]=new Chart(canvas,cfg);
}

function render(){
  renderOverallMetrics();
  const list=document.getElementById('trackersList');
  if(!trackers.length){
    list.innerHTML=`<div class="empty-state"><h3>Нет показателей</h3><p>создайте первый показатель ниже</p></div>`;
    return;
  }
  list.innerHTML=trackers.map(t=>{
    const s=getStats(t);
    const pct=goalPct(t);
    const last5=[...t.entries].slice(-5).reverse();
    const diffHtml=s&&s.diff!==null?`<span class="metric-diff ${s.diff<=0&&t.dir==='lower'?'diff-pos':s.diff>=0&&t.dir==='higher'?'diff-pos':'diff-neg'}">${s.diff>0?'+':''}${s.diff}</span>`:'';
    const goalHtml=pct!==null?`<div class="goal-display"><span>цель: ${t.goal} ${t.unit}</span><div class="goal-bar-wrap"><div class="goal-bar-fill" style="width:${pct}%;background:${t.color}"></div></div><span>${pct}%</span></div>`:'';
    return`<div class="tracker-card ${t.collapsed?'collapsed':''}" id="tc_${t.id}">
      <div class="tracker-head" onclick="toggleTracker('${t.id}')">
        <div class="tracker-color-dot" style="background:${t.color}"></div>
        <div class="tracker-name">${t.name}</div>
        ${s?`<div class="tracker-latest">${s.last}<span class="tracker-unit">${t.unit}</span></div>${diffHtml}`:'<span style="font-size:10px;color:var(--text3)">нет данных</span>'}
        <span class="caret">&#9660;</span>
      </div>
      <div class="tracker-body">
        <div class="tracker-inner">
          ${goalHtml}
          ${t.entries.length?`<div class="chart-wrap"><canvas id="ch_${t.id}" role="img" aria-label="График ${t.name}"></canvas></div>`:''}
          <div class="add-entry-row">
            <input class="entry-input" id="ei_${t.id}" type="number" placeholder="Новое значение…" step="any"
              onkeypress="if(event.key==='Enter')addEntry('${t.id}')">
            <button class="add-entry-btn" onclick="addEntry('${t.id}')">+ добавить</button>
          </div>
          <div class="entries-mini">
            ${last5.map(e=>`<div class="entry-row">
              <span class="entry-date">${fmtDate(e.date)}</span>
              <span class="entry-val">${e.val} ${t.unit}</span>
              <button class="entry-del" onclick="deleteEntry('${t.id}',${e.ts})">×</button>
            </div>`).join('')}
          </div>
          <div class="tracker-actions">
            <button class="del-tracker-btn" onclick="deleteTracker('${t.id}')">удалить показатель</button>
          </div>
        </div>
      </div>
    </div>`;
  }).join('');

  trackers.forEach(t=>{
    if(!t.collapsed && t.entries.length){
      renderChart(t,'ch_'+t.id);
    }
  });
}

load();
renderColorPicker();
render();
</script>
